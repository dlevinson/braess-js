<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Braess</title>
    <style>
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: #f7fbfd;
        color: #102542;
      }

      .boot-note {
        max-width: 48rem;
        margin: 3rem auto;
        padding: 1.25rem 1.5rem;
        border-radius: 1rem;
        background: #ffffff;
        border: 1px solid #d5e1ea;
        box-shadow: 0 10px 28px rgba(16, 37, 66, 0.08);
        line-height: 1.5;
      }

      code {
        background: #e8eef5;
        border-radius: 0.35rem;
        padding: 0.1rem 0.3rem;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-note">
        <h1>Braess</h1>
        <p>This source <code>index.html</code> is a Vite entrypoint, so opening it directly from <code>file://</code> will not launch the app.</p>
        <p>Use <code>npm run dev</code> for development, or run <code>npm run build</code> and then open <code>web/index.html</code> directly in the browser.</p>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
